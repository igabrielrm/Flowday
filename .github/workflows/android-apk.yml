name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build and sync Android
        run: npm run android:sync
        working-directory: frontend

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: frontend/android

      - name: Build debug APK and unsigned release bundle
        run: ./gradlew assembleDebug bundleRelease
        working-directory: frontend/android

      - name: Upload Flowday APK
        uses: actions/upload-artifact@v4
        with:
          name: flowday-android-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload unsigned release AAB
        uses: actions/upload-artifact@v4
        with:
          name: flowday-android-release-unsigned
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30
