# ============================================
# CONFIGURACI\u00d3N DE PRODUCCI\u00d3N
# ============================================

# Puerto
server.port=8080

# ============================================
# BASE DE DATOS
# ============================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eventorganizer_uce}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:labcom,2015}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# HIBERNATE - PRODUCCI\u00d3N
# ============================================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================
# SEGURIDAD - PRODUCCI\u00d3N
# ============================================

server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ============================================
# THYMELEAF - PRODUCCI\u00d3N
# ============================================

spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ============================================
# LOGGING - PRODUCCI\u00d3N
# ============================================

logging.level.root=WARN
logging.level.com.uce.servidorproyecto=INFO
logging.file.name=logs/eventorganizer.log
logging.file.max-size=10MB
logging.file.max-history=7

# ============================================
# MANEJO DE ERRORES - PRODUCCI\u00d3N
# ============================================

server.error.include-exception=false
server.error.include-stacktrace=never
server.error.include-message=never
server.error.whitelabel.enabled=false

# IA (variables de entorno en producción)
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent}
claude.api.key=${CLAUDE_API_KEY:}
claude.api.url=${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
ia.provider=${IA_PROVIDER:groq}