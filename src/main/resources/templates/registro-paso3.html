<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Crear cuenta — Paso 3</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="auth-page-body auth-register-body">

<div th:replace="~{fragments/auth-common :: authBackground}"></div>
<header th:replace="~{fragments/auth-common :: authTopbar}"></header>

<div class="auth-page-content auth-register-content">
    <div class="auth-split-card auth-register-card fade-in">
        <div class="auth-float-brand">
            <h2>Event Organizer UCE</h2>
            <p>Último paso</p>
        </div>

        <p class="steps-label">Paso 3 de 3 — Contacto de emergencia</p>
        <div class="steps-header">
            <div class="step-segment done"></div>
            <div class="step-segment done"></div>
            <div class="step-segment done"></div>
        </div>

        <h2 class="auth-register-heading">Contacto de emergencia</h2>
        <p class="auth-register-sub">¿A quién contactamos si necesitas ayuda urgente?</p>

        <div class="alert alert-info" style="margin-bottom:1.25rem;">
            <span>Esta información es confidencial y solo se usa en casos de emergencia.</span>
        </div>

        <form th:action="@{/registro/paso3}" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Nombre del contacto</label>
                <input type="text" name="nombreEmergencia" class="form-control auth-input-lg"
                       placeholder="Ej: Carlos Domínguez" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Teléfono del contacto</label>
                <input type="tel" name="telefonoEmergencia" class="form-control auth-input-lg"
                       placeholder="0991234567" required pattern="\d{10}" maxlength="10"/>
            </div>
            <div class="form-group">
                <label class="form-label">Relación</label>
                <select name="relacionEmergencia" class="form-control auth-input-lg" required>
                    <option value="">Seleccionar...</option>
                    <option>Padre</option>
                    <option>Madre</option>
                    <option>Hermano/a</option>
                    <option>Pareja</option>
                    <option>Amigo/a de confianza</option>
                    <option>Otro familiar</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Completar registro</button>
        </form>
    </div>
</div>

<script th:replace="~{fragments/auth-common :: authThemeScript}"></script>
</body>
</html>
