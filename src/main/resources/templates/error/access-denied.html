<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Acceso Denegado - Event Organizer UCE</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .error-page .error-icon {
            font-size: 80px;
            margin-bottom: 1rem;
        }
        .error-page h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: .5rem;
        }
        .error-page p {
            font-size: 16px;
            color: var(--text3);
            max-width: 500px;
        }
        .error-page .btn {
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="error-page">
    <div class="error-icon">🚫</div>
    <h1>Acceso Denegado</h1>
    <p>No tienes permisos para acceder a esta página. Por favor, contacta al administrador si crees que esto es un error.</p>
    <a th:href="@{/dashboard}" class="btn btn-primary">Volver al Inicio</a>
</div>
</body>
</html>
