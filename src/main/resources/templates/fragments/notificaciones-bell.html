<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="campana" class="notif-wrapper" th:if="${usuario != null}">
    <button type="button" class="btn-icon notif-bell" id="btnNotificaciones"
            onclick="toggleNotificaciones(event)" aria-label="Notificaciones" title="Notificaciones">
        🔔
        <span class="notif-badge" id="notifBadge"
              th:text="${notificacionesNoLeidas != null and notificacionesNoLeidas > 0} ? ${notificacionesNoLeidas} : ''"
              th:classappend="${notificacionesNoLeidas == null or notificacionesNoLeidas == 0} ? ' hidden' : ''"></span>
    </button>
    <div class="notif-dropdown hidden" id="notifDropdown">
        <div class="notif-dropdown-header">
            <span>Notificaciones</span>
            <button type="button" class="notif-mark-all" onclick="marcarTodasLeidas()">Marcar todas</button>
        </div>
        <div class="notif-list" id="notifList">
            <p class="notif-empty">Cargando...</p>
        </div>
    </div>
</div>
</body>
</html>
