<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modalConfirmar" id="modalConfirmar" class="modal-confirm-overlay hidden" hidden role="dialog" aria-modal="true">
    <div class="modal-confirm-card">
        <h4 id="modalConfirmarTitulo">Confirmar</h4>
        <p id="modalConfirmarMensaje">¿Estás seguro?</p>
        <div class="modal-confirm-actions">
            <button type="button" class="btn btn-secondary btn-sm" onclick="cerrarConfirmacion()">Cancelar</button>
            <button type="button" class="btn btn-danger btn-sm" id="modalConfirmarBtnOk">Eliminar</button>
        </div>
    </div>
</div>

<script th:fragment="confirmarScripts">
(function () {
    let confirmCallback = null;

    window.mostrarConfirmacion = function (titulo, mensaje, onConfirm, textoBtn) {
        const modal = document.getElementById('modalConfirmar');
        if (!modal) {
            if (confirm(mensaje)) onConfirm?.();
            return;
        }
        document.getElementById('modalConfirmarTitulo').textContent = titulo || 'Confirmar';
        document.getElementById('modalConfirmarMensaje').textContent = mensaje || '¿Estás seguro?';
        const btn = document.getElementById('modalConfirmarBtnOk');
        if (btn) btn.textContent = textoBtn || 'Confirmar';
        confirmCallback = onConfirm;
        modal.classList.remove('hidden');
    };

    window.cerrarConfirmacion = function () {
        document.getElementById('modalConfirmar')?.classList.add('hidden');
        confirmCallback = null;
    };

    document.getElementById('modalConfirmarBtnOk')?.addEventListener('click', () => {
        const cb = confirmCallback;
        cerrarConfirmacion();
        if (typeof cb === 'function') cb();
    });

    document.getElementById('modalConfirmar')?.addEventListener('click', e => {
        if (e.target.id === 'modalConfirmar') cerrarConfirmacion();
    });

    window.mostrarToast = window.mostrarToast || function (msg, esError) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg' + (esError ? ' toast-error' : '');
        toast.textContent = msg;
        document.body.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 2800);
    };

    window.eliminarActividadConfirmada = async function (id, onSuccess) {
        mostrarConfirmacion('Eliminar actividad', '¿Eliminar esta actividad? Esta acción no se puede deshacer.', async () => {
            try {
                const res = await fetch('/actividades/api/eliminar/' + id, { method: 'POST' });
                const data = await res.json();
                if (!data.ok) throw new Error(data.mensaje || 'Error al eliminar');
                mostrarToast('Actividad eliminada');
                if (typeof onSuccess === 'function') {
                    onSuccess();
                } else {
                    window.location.href = '/actividades';
                }
            } catch (e) {
                mostrarToast(e.message, true);
            }
        }, 'Eliminar');
    };
})();
</script>

</body>
</html>
