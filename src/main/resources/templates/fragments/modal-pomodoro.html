<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modalPomodoro" id="modalPomodoro" class="modal-overlay hidden" role="dialog" aria-labelledby="pomModalTitulo">
    <div class="modal-card modal-pomodoro-card">
        <div class="modal-header">
            <div>
                <h3 id="pomModalTitulo">🍅 Pomodoro</h3>
                <p class="modal-subtitle" id="pomModalSubtitulo">Enfócate en una tarea</p>
            </div>
            <button type="button" class="btn-icon" onclick="cerrarModalPomodoro()" aria-label="Cerrar">✕</button>
        </div>

        <div class="pomodoro-ring pomodoro-ring-lg">
            <svg width="160" height="160" viewBox="0 0 160 160">
                <circle cx="80" cy="80" r="68" fill="none" stroke="var(--bg4)" stroke-width="10"/>
                <circle id="pomModalRing" cx="80" cy="80" r="68" fill="none" stroke="#22c55e" stroke-width="10"
                        stroke-dasharray="427" stroke-dashoffset="0" stroke-linecap="round"
                        transform="rotate(-90 80 80)"/>
            </svg>
            <div class="time pom-modal-time" id="pomModalTime">25:00</div>
        </div>

        <div class="pom-modal-meta">
            <span id="pomModalSesionInfo">Sesión 1 de 1</span>
            <span id="pomModalDuracionInfo">25 min de enfoque</span>
        </div>

        <div class="pomodoro-mode-btns pom-modal-modes">
            <button type="button" class="pausa-btn active" data-pom-mode="estudio" onclick="setPomModalMode('estudio')">📚 Enfoque</button>
            <button type="button" class="pausa-btn" data-pom-mode="corta" onclick="setPomModalMode('corta')">☕ Pausa</button>
            <button type="button" class="pausa-btn" data-pom-mode="larga" onclick="setPomModalMode('larga')">🌿 Descanso</button>
        </div>

        <div class="pom-modal-actions">
            <button type="button" class="btn btn-primary btn-lg" id="pomModalBtn" onclick="togglePomodoroModal()">▶ Iniciar</button>
            <button type="button" class="btn btn-outline" onclick="resetPomodoroModal()">↺ Reiniciar</button>
        </div>
    </div>
</div>

<script th:fragment="pomodoroScripts">
(function () {
    const CIRC = 2 * Math.PI * 68;
    let pomConfig = { sesionMinutos: 25, sesionesTotales: 1, pausaCorta: 5, pausaLarga: 15, duracionTotal: 25 };
    let pomSesionActual = 1;
    let pomTotal = 25 * 60;
    let pomLeft = pomTotal;
    let pomRunning = false;
    let pomInterval = null;
    let pomMode = 'estudio';
    let pomActividadId = null;
    let pomTitulo = '';

    function calcularPomodoroParaTarea(duracionMinutos) {
        const d = duracionMinutos && duracionMinutos > 0 ? duracionMinutos : 25;
        if (d <= 25) {
            return {
                sesionMinutos: d,
                sesionesTotales: 1,
                pausaCorta: Math.max(3, Math.round(d * 0.2)),
                pausaLarga: Math.max(8, Math.round(d * 0.3)),
                duracionTotal: d
            };
        }
        const sesionesTotales = Math.ceil(d / 25);
        const sesionMinutos = Math.min(25, Math.max(15, Math.round(d / sesionesTotales)));
        return {
            sesionMinutos,
            sesionesTotales,
            pausaCorta: Math.max(5, Math.min(10, Math.round(d * 0.08))),
            pausaLarga: Math.min(15, Math.max(10, Math.round(d * 0.12))),
            duracionTotal: d
        };
    }

    function updatePomModalDisplay() {
        const m = String(Math.floor(pomLeft / 60)).padStart(2, '0');
        const s = String(pomLeft % 60).padStart(2, '0');
        const timeEl = document.getElementById('pomModalTime');
        const ringEl = document.getElementById('pomModalRing');
        if (timeEl) timeEl.textContent = m + ':' + s;
        if (ringEl) {
            ringEl.setAttribute('stroke-dashoffset', CIRC * (pomLeft / pomTotal));
            const colors = { estudio: '#22c55e', corta: '#f59e0b', larga: '#3b82f6' };
            ringEl.setAttribute('stroke', colors[pomMode] || '#22c55e');
        }
    }

    function actualizarMetaModal() {
        const info = document.getElementById('pomModalSesionInfo');
        const dur = document.getElementById('pomModalDuracionInfo');
        if (info) info.textContent = 'Sesión ' + pomSesionActual + ' de ' + pomConfig.sesionesTotales;
        if (dur) {
            const mins = pomMode === 'estudio' ? pomConfig.sesionMinutos
                : pomMode === 'corta' ? pomConfig.pausaCorta : pomConfig.pausaLarga;
            dur.textContent = mins + ' min · tarea estimada ' + pomConfig.duracionTotal + ' min';
        }
    }

    function marcarModoActivo(mode) {
        document.querySelectorAll('#modalPomodoro [data-pom-mode]').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-pom-mode') === mode);
        });
    }

    window.setPomModalMode = function (mode) {
        clearInterval(pomInterval);
        pomRunning = false;
        pomMode = mode;
        const btn = document.getElementById('pomModalBtn');
        if (btn) btn.textContent = '▶ Iniciar';
        let mins = pomConfig.sesionMinutos;
        if (mode === 'corta') mins = pomConfig.pausaCorta;
        if (mode === 'larga') mins = pomConfig.pausaLarga;
        pomTotal = mins * 60;
        pomLeft = pomTotal;
        marcarModoActivo(mode);
        actualizarMetaModal();
        updatePomModalDisplay();
    };

    async function guardarSesionPomodoro(minutos) {
        try {
            await fetch('/api/bienestar/pomodoro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duracion: minutos, actividadId: pomActividadId })
            });
            const valEl = document.getElementById('sesionesPomodoroVal');
            if (valEl) valEl.textContent = (parseInt(valEl.textContent || '0', 10) + 1);
        } catch (_) {}
    }

    window.togglePomodoroModal = function () {
        const btn = document.getElementById('pomModalBtn');
        if (!btn) return;
        if (pomRunning) {
            clearInterval(pomInterval);
            pomRunning = false;
            btn.textContent = '▶ Continuar';
        } else {
            pomRunning = true;
            btn.textContent = '⏸ Pausar';
            pomInterval = setInterval(() => {
                if (pomLeft <= 0) {
                    clearInterval(pomInterval);
                    pomRunning = false;
                    btn.textContent = '▶ Iniciar';
                    if (pomMode === 'estudio') {
                        guardarSesionPomodoro(Math.round(pomTotal / 60));
                        if (pomSesionActual < pomConfig.sesionesTotales) {
                            pomSesionActual++;
                            setPomModalMode('corta');
                            if (typeof mostrarToast === 'function') {
                                mostrarToast('☕ Pausa corta — sesión ' + (pomSesionActual - 1) + ' completada');
                            }
                        } else {
                            if (typeof mostrarToast === 'function') {
                                mostrarToast('🎉 ¡Pomodoro completado para "' + pomTitulo + '"!');
                            }
                        }
                    } else {
                        if (pomSesionActual <= pomConfig.sesionesTotales) {
                            setPomModalMode('estudio');
                        }
                    }
                    return;
                }
                pomLeft--;
                updatePomModalDisplay();
            }, 1000);
        }
    };

    window.resetPomodoroModal = function () {
        clearInterval(pomInterval);
        pomRunning = false;
        pomSesionActual = 1;
        const btn = document.getElementById('pomModalBtn');
        if (btn) btn.textContent = '▶ Iniciar';
        setPomModalMode('estudio');
    };

    window.abrirModalPomodoro = function (actividadId, titulo, duracionMinutos) {
        pomActividadId = actividadId || null;
        pomTitulo = titulo || 'Tarea';
        pomConfig = calcularPomodoroParaTarea(duracionMinutos);
        pomSesionActual = 1;

        const modal = document.getElementById('modalPomodoro');
        const tituloEl = document.getElementById('pomModalTitulo');
        const subEl = document.getElementById('pomModalSubtitulo');
        if (tituloEl) tituloEl.textContent = '🍅 ' + pomTitulo;
        if (subEl) {
            subEl.textContent = pomConfig.sesionesTotales > 1
                ? pomConfig.sesionesTotales + ' sesiones sugeridas según la duración de la tarea'
                : 'Sesión única adaptada a tu tarea';
        }
        if (modal) modal.classList.remove('hidden');
        resetPomodoroModal();
    };

    window.cerrarModalPomodoro = function () {
        clearInterval(pomInterval);
        pomRunning = false;
        const modal = document.getElementById('modalPomodoro');
        if (modal) modal.classList.add('hidden');
    };

    document.getElementById('modalPomodoro')?.addEventListener('click', function (e) {
        if (e.target === this) cerrarModalPomodoro();
    });

    document.addEventListener('click', function (e) {
        const trigger = e.target.closest('.btn-pomodoro-trigger');
        if (!trigger) return;
        e.preventDefault();
        const id = trigger.dataset.id;
        const titulo = trigger.dataset.titulo || 'Tarea';
        const duracion = parseInt(trigger.dataset.duracion || '25', 10);
        abrirModalPomodoro(id, titulo, duracion);
    });
})();
</script>

</body>
</html>
