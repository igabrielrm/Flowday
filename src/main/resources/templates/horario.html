<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Horario de clases — Event Organizer UCE</title>
    <th:block th:replace="~{fragments/pwa-head :: pwaHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
<div class="layout">

    <aside th:replace="~{dashboard :: menuLateral}"></aside>

    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="btn-icon" onclick="toggleSidebar()" aria-label="Menú">☰</button>
                <span class="topbar-title">Horario de clases</span>
            </div>
            <div class="topbar-actions">
                <div th:replace="~{fragments/notificaciones-bell :: campana}"></div>
                <button class="btn-icon" data-theme-btn onclick="toggleTheme()">☀️</button>
            </div>
        </header>

        <main class="page-body">
            <div class="horario-page-header">
                <div>
                    <h2 class="section-heading">Mi horario semanal</h2>
                    <p class="section-heading-meta">Organiza tus materias por día y hora. Click en una celda vacía para agregar, o en un bloque para editar.</p>
                </div>
                <button type="button" class="btn btn-primary btn-lg" onclick="abrirModalClase()">+ Agregar clase</button>
            </div>

            <div class="card horario-card fade-in">
                <div class="horario-scroll">
                    <div class="horario-layout" id="horarioLayout">
                        <!-- Generado por JS -->
                    </div>
                </div>
                <div class="horario-leyenda">
                    <span>Columna resaltada = hoy</span>
                    <span class="horario-leyenda-dot hoy"></span>
                    <span style="margin-left:1rem;">Línea roja = hora actual</span>
                    <span class="horario-leyenda-dot ahora"></span>
                </div>
            </div>

            <div id="horarioVacio" class="empty-state hidden">
                <p>Aún no tienes clases registradas.</p>
                <button type="button" class="btn btn-primary" onclick="abrirModalClase()">Agregar mi primera clase</button>
            </div>
        </main>
    </div>
</div>

<!-- Modal agregar/editar clase -->
<div id="modalHorarioClase" class="modal-overlay hidden" role="dialog">
    <div class="modal-card horario-modal-card">
        <div class="modal-header">
            <h3 id="modalHorarioTitulo">Agregar clase</h3>
            <button type="button" class="btn-icon" onclick="cerrarModalClase()" aria-label="Cerrar">✕</button>
        </div>
        <div id="horarioFormAlert" class="alert alert-danger hidden"></div>
        <form id="formHorarioClase" onsubmit="guardarClase(event)">
            <input type="hidden" id="horarioClaseId"/>
            <div class="form-group">
                <label class="form-label" for="horarioMateria">Materia *</label>
                <input type="text" id="horarioMateria" class="form-control" required placeholder="Ej: Programación Orientada a Objetos"/>
            </div>
            <div class="form-row horario-form-row">
                <div class="form-group">
                    <label class="form-label" for="horarioDia">Día *</label>
                    <select id="horarioDia" class="form-control" required>
                        <option value="1">Lunes</option>
                        <option value="2">Martes</option>
                        <option value="3">Miércoles</option>
                        <option value="4">Jueves</option>
                        <option value="5">Viernes</option>
                        <option value="6">Sábado</option>
                        <option value="7">Domingo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="horarioColor">Color</label>
                    <input type="color" id="horarioColor" class="form-control horario-color-input" value="#3b82f6"/>
                </div>
            </div>
            <div class="form-row horario-form-row">
                <div class="form-group">
                    <label class="form-label" for="horarioInicio">Hora inicio *</label>
                    <input type="time" id="horarioInicio" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label" for="horarioFin">Hora fin *</label>
                    <input type="time" id="horarioFin" class="form-control" required/>
                </div>
            </div>
            <div class="form-row horario-form-row">
                <div class="form-group">
                    <label class="form-label" for="horarioAula">Aula / lugar</label>
                    <input type="text" id="horarioAula" class="form-control" placeholder="Ej: Lab. 204"/>
                </div>
                <div class="form-group">
                    <label class="form-label" for="horarioProfesor">Profesor</label>
                    <input type="text" id="horarioProfesor" class="form-control" placeholder="Opcional"/>
                </div>
            </div>
            <div class="horario-modal-actions">
                <button type="button" id="btnEliminarClase" class="btn btn-danger hidden" onclick="eliminarClase()">Eliminar</button>
                <div class="horario-modal-actions-right">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModalClase()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnGuardarClase">Guardar</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/companero-virtual :: companeroModal}"></div>
<div th:replace="~{fragments/companero-virtual :: companeroFlotante}"></div>
<div th:replace="~{fragments/modal-confirmar :: modalConfirmar}"></div>

<script th:replace="~{fragments/layout-scripts :: layoutScripts}"></script>
<script th:replace="~{fragments/companero-virtual :: companeroScripts}"></script>
<script th:replace="~{fragments/companero-virtual :: companeroFlotanteScripts}"></script>
<script th:replace="~{fragments/modal-confirmar :: confirmarScripts}"></script>
<script th:inline="javascript">
    const HORA_INICIO = /*[[${horaInicio}]]*/ 7;
    const HORA_FIN = /*[[${horaFin}]]*/ 21;
    const SLOT_PX = 52;
    const DIAS = ['', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
    const HOY = new Date().getDay() === 0 ? 7 : new Date().getDay();

    let clasesCache = [];

    function timeToMinutes(t) {
        if (!t) return 0;
        const p = t.split(':');
        return parseInt(p[0], 10) * 60 + parseInt(p[1], 10);
    }

    function minutosToTop(min) {
        return ((min - HORA_INICIO * 60) / 60) * SLOT_PX;
    }

    function buildGrid() {
        const layout = document.getElementById('horarioLayout');
        if (!layout) return;
        layout.innerHTML = '';

        const headerRow = document.createElement('div');
        headerRow.className = 'horario-header-row';
        const corner = document.createElement('div');
        corner.className = 'horario-corner';
        headerRow.appendChild(corner);
        for (let d = 1; d <= 7; d++) {
            const h = document.createElement('div');
            h.className = 'horario-day-header' + (d === HOY ? ' hoy' : '');
            h.textContent = DIAS[d];
            headerRow.appendChild(h);
        }
        layout.appendChild(headerRow);

        const body = document.createElement('div');
        body.className = 'horario-body';

        const timesCol = document.createElement('div');
        timesCol.className = 'horario-times-col';
        for (let h = HORA_INICIO; h < HORA_FIN; h++) {
            const label = document.createElement('div');
            label.className = 'horario-time-label';
            label.style.height = SLOT_PX + 'px';
            label.textContent = String(h).padStart(2, '0') + ':00';
            timesCol.appendChild(label);
        }
        body.appendChild(timesCol);

        for (let d = 1; d <= 7; d++) {
            const dayCol = document.createElement('div');
            dayCol.className = 'horario-day-col' + (d === HOY ? ' hoy' : '');
            dayCol.dataset.dia = d;

            const slots = document.createElement('div');
            slots.className = 'horario-slots';
            for (let h = HORA_INICIO; h < HORA_FIN; h++) {
                const cell = document.createElement('div');
                cell.className = 'horario-cell';
                cell.style.height = SLOT_PX + 'px';
                cell.addEventListener('click', () => abrirModalClase(null, d, String(h).padStart(2, '0') + ':00'));
                slots.appendChild(cell);
            }
            dayCol.appendChild(slots);

            const layer = document.createElement('div');
            layer.className = 'horario-blocks-layer';
            layer.dataset.dia = d;
            dayCol.appendChild(layer);

            body.appendChild(dayCol);
        }
        layout.appendChild(body);
        renderBlocks();
        renderNowLine();
    }

    function renderNowLine() {
        document.querySelectorAll('.horario-now-line').forEach(el => el.remove());
        const now = new Date();
        const minutes = now.getHours() * 60 + now.getMinutes();
        if (minutes < HORA_INICIO * 60 || minutes >= HORA_FIN * 60) return;

        const body = document.querySelector('.horario-body');
        if (!body) return;

        const top = minutosToTop(minutes);
        const line = document.createElement('div');
        line.className = 'horario-now-line';
        line.style.top = top + 'px';

        const label = document.createElement('span');
        label.className = 'horario-now-label';
        label.textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        line.appendChild(label);

        body.appendChild(line);
    }

    function renderBlocks() {
        document.querySelectorAll('.horario-blocks-layer').forEach(layer => {
            layer.innerHTML = '';
        });

        clasesCache.forEach(c => {
            const layer = document.querySelector('.horario-blocks-layer[data-dia="' + c.diaSemana + '"]');
            if (!layer) return;
            const inicio = timeToMinutes(c.horaInicio);
            const fin = timeToMinutes(c.horaFin);
            const top = minutosToTop(inicio);
            const height = Math.max(((fin - inicio) / 60) * SLOT_PX - 4, 28);
            const block = document.createElement('button');
            block.type = 'button';
            block.className = 'horario-block';
            block.style.top = top + 'px';
            block.style.height = height + 'px';
            block.style.background = c.color || '#3b82f6';
            block.innerHTML = '<strong>' + esc(c.materia) + '</strong><span>' + esc(c.horaInicio) + ' – ' + esc(c.horaFin) + '</span>';
            if (c.aula) block.innerHTML += '<small>' + esc(c.aula) + '</small>';
            block.addEventListener('click', e => { e.stopPropagation(); abrirModalClase(c); });
            layer.appendChild(block);
        });

        document.getElementById('horarioVacio')?.classList.toggle('hidden', clasesCache.length > 0);
        renderNowLine();
    }

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function cargarClases() {
        try {
            const res = await fetch('/horario/api/clases');
            const data = await res.json();
            if (data.ok) {
                clasesCache = data.clases || [];
                buildGrid();
            }
        } catch (e) {
            console.error(e);
        }
    }

    function abrirModalClase(clase, diaPreset, horaPreset) {
        document.getElementById('horarioFormAlert')?.classList.add('hidden');
        document.getElementById('modalHorarioClase')?.classList.remove('hidden');
        const esEdicion = clase && clase.id;
        document.getElementById('modalHorarioTitulo').textContent = esEdicion ? 'Editar clase' : 'Agregar clase';
        document.getElementById('horarioClaseId').value = esEdicion ? clase.id : '';
        document.getElementById('horarioMateria').value = esEdicion ? clase.materia : '';
        document.getElementById('horarioDia').value = esEdicion ? clase.diaSemana : (diaPreset || '1');
        document.getElementById('horarioInicio').value = esEdicion ? clase.horaInicio : (horaPreset || '08:00');
        document.getElementById('horarioFin').value = esEdicion ? clase.horaFin : (horaPreset ? sumarHora(horaPreset, 2) : '10:00');
        document.getElementById('horarioAula').value = esEdicion ? (clase.aula || '') : '';
        document.getElementById('horarioProfesor').value = esEdicion ? (clase.profesor || '') : '';
        document.getElementById('horarioColor').value = esEdicion ? (clase.color || '#3b82f6') : '#3b82f6';
        document.getElementById('btnEliminarClase')?.classList.toggle('hidden', !esEdicion);
    }

    function sumarHora(hora, horas) {
        const m = timeToMinutes(hora) + horas * 60;
        const hh = Math.min(Math.floor(m / 60), 23);
        const mm = m % 60;
        return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
    }

    function cerrarModalClase() {
        document.getElementById('modalHorarioClase')?.classList.add('hidden');
    }

    async function guardarClase(e) {
        e.preventDefault();
        const id = document.getElementById('horarioClaseId').value;
        const body = new URLSearchParams({
            materia: document.getElementById('horarioMateria').value.trim(),
            diaSemana: document.getElementById('horarioDia').value,
            horaInicio: document.getElementById('horarioInicio').value,
            horaFin: document.getElementById('horarioFin').value,
            aula: document.getElementById('horarioAula').value.trim(),
            profesor: document.getElementById('horarioProfesor').value.trim(),
            color: document.getElementById('horarioColor').value
        });
        const url = id ? '/horario/api/actualizar/' + id : '/horario/api/guardar';
        const alertEl = document.getElementById('horarioFormAlert');
        try {
            const res = await fetch(url, { method: 'POST', body });
            const data = await res.json();
            if (!data.ok) throw new Error(data.mensaje || 'Error al guardar');
            cerrarModalClase();
            await cargarClases();
            if (typeof mostrarToast === 'function') mostrarToast('Horario guardado');
        } catch (err) {
            if (alertEl) {
                alertEl.textContent = err.message;
                alertEl.classList.remove('hidden');
            }
        }
    }

    function eliminarClase() {
        const id = document.getElementById('horarioClaseId').value;
        if (!id) return;
        const ejecutar = async () => {
            try {
                const res = await fetch('/horario/api/eliminar/' + id, { method: 'POST' });
                const data = await res.json();
                if (!data.ok) throw new Error(data.mensaje);
                cerrarModalClase();
                await cargarClases();
                if (typeof mostrarToast === 'function') mostrarToast('Clase eliminada');
            } catch (err) {
                if (typeof mostrarToast === 'function') mostrarToast(err.message, true);
                else alert(err.message);
            }
        };
        if (typeof mostrarConfirmacion === 'function') {
            mostrarConfirmacion('Eliminar clase', '¿Quitar esta materia de tu horario semanal?', ejecutar, 'Eliminar');
        } else if (confirm('¿Eliminar esta clase del horario?')) {
            ejecutar();
        }
    }

    document.getElementById('modalHorarioClase')?.addEventListener('click', e => {
        if (e.target.id === 'modalHorarioClase') cerrarModalClase();
    });

    document.addEventListener('DOMContentLoaded', () => {
        cargarClases();
        setInterval(renderNowLine, 60000);
    });
</script>
</body>
</html>
