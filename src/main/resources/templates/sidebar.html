<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="menuLateral" class="sidebar">
        <div class="profile-section">
            <div class="avatar">JU</div>
            <h3>Juan Carlos</h3>
            <p>jcpuetate@uce.edu.ec</p>
        </div>
        
        <nav class="menu-nav">
            <a th:href="@{/dashboard}"><i></i> Inicio</a>
            <a th:href="@{/actividades}"><i></i> Mis actividades</a>
            <a th:href="@{/calendario}"><i></i> Calendario</a>
            <a th:href="@{/comunidad}"><i></i> Comunidad</a>
            <a th:href="@{/perfil}"><i></i> Mi perfil</a>
        </nav>

        <button id="theme-toggle" class="btn-theme">
            <i id="theme-icon" class="fas fa-sun"></i>
        </button>
        
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const themeToggleBtn = document.getElementById('theme-toggle');
                const themeIcon = document.getElementById('theme-icon');
                if (!themeToggleBtn) return;

                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'light') {
                    if(themeIcon) themeIcon.className = 'fas fa-moon';
                } else {
                    if(themeIcon) themeIcon.className = 'fas fa-sun';
                }

                themeToggleBtn.addEventListener('click', () => {
                    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                    if (isLight) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'dark');
                        if(themeIcon) themeIcon.className = 'fas fa-sun';
                    } else {
                        document.documentElement.setAttribute('data-theme', 'light');
                        localStorage.setItem('theme', 'light');
                        if(themeIcon) themeIcon.className = 'fas fa-moon';
                    }
                });
            });
        </script>
    </div>

</body>
</html>
